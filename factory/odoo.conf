[options]
# Odoo base image config template — "one image, two environments".
# Lines marked (env) are overwritten at container start by entrypoint.sh.

# Paths & Core
addons_path = /opt/odoo/addons
data_dir = /var/lib/odoo

# Security (env)
admin_passwd = changeme
list_db = True
dbfilter = .*
without_demo = True

# Performance (env)
workers = 0
max_cron_threads = 2
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_time_cpu = 60
limit_time_real = 120

# Logging (env)
log_level = info
logfile = None
log_handler = [':INFO']

# Network & Proxy
http_port = 8069
gevent_port = 8072
proxy_mode = True

# Email (env)
smtp_server = localhost
smtp_port = 25
