[options]
# Odoo base image config template — "one image, two environments".
# Lines marked (env: VAR) are overwritten at container start by entrypoint.sh.
# db_host/db_port/db_user/db_password/database are NOT set here — they are
# passed as CLI args by entrypoint.sh's wait_for_db(), only for server launches.

# Paths & Core
addons_path = /opt/odoo/addons  # (env) dynamic, computed from mounted layers
data_dir = /var/lib/odoo

# Security
admin_passwd = changeme  # (env: ODOO_ADMIN_PASSWD)
list_db = True  # (env: ODOO_LIST_DB)
dbfilter = .*  # (env: ODOO_DB_FILTER)
without_demo = True  # (env: ODOO_WITHOUT_DEMO)

# Performance
workers = 0  # (env: ODOO_WORKERS)
max_cron_threads = 2
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_time_cpu = 60
limit_time_real = 120

# Logging
log_level = info  # (env: ODOO_LOG_LEVEL)
logfile = None
log_handler = [':INFO']

# Network & Proxy
http_port = 8069
gevent_port = 8072
proxy_mode = True  # (env: ODOO_PROXY_MODE)

# Email
smtp_server = localhost  # (env: SMTP_SERVER)
smtp_port = 25  # (env: SMTP_PORT)
