name: forge-ar-enterprise
odoo_version: "19.0"
edition: enterprise

layers:
  # --- OCA ------------------------------------------------------------------
  # `category` is a free-form user label (open categories, pure mount model):
  # this layer nests read-only at /mnt/custom/oca/. It is NOT the community
  # system root — those are only community/enterprise/worktrees, populated by
  # `core`/`enterprise`, never by a user layer.
  - type: git
    name: oca
    category: oca
    repos:
      - url: https://github.com/OCA/sale-workflow.git            # sale_order_type
        ref: "19.0"
      - url: https://github.com/OCA/stock-logistics-workflow.git # stock_picking_invoice_link
        ref: "19.0"

  # --- AdHoc (ingadhoc) -----------------------------------------------------
  # odoo-argentina-ee (l10n_ar_account_reports) va junto con el resto: ya no
  # hace falta separarlo en su propia capa. `requires_enterprise` era un flag
  # por CAPA COMPLETA — fusionarlo antes hubiera bloqueado toda esta capa
  # (community) detrás de edition: enterprise. Ese campo se removió de
  # GitLayer (solo sigue existiendo en PublishedLayer, que nunca tiene
  # checkout real). La dependencia real de account_reports la valida
  # `forge validate`/`forge onboard` contra los manifests de los módulos
  # instalados, no un flag manual — no importa en qué capa esté declarado.
  - type: git
    name: adhoc
    category: adhoc
    repos:
      - url: https://github.com/ingadhoc/odoo-argentina.git        # l10n_ar_tax, l10n_ar_tax_python, l10n_ar_ux
        ref: "19.0"
      - url: https://github.com/ingadhoc/odoo-argentina-ce.git     # l10n_ar_reports (dep de l10n_ar_account_reports)
        ref: "19.0"
      - url: https://github.com/ingadhoc/odoo-argentina-ee.git     # l10n_ar_account_reports (requiere Enterprise)
        ref: "19.0"
      - url: https://github.com/ingadhoc/argentina-sale.git        # targets: l10n_ar_sale_order_type, l10n_ar_stock_delivery
        ref: "19.0"
      - url: https://github.com/ingadhoc/account-payment.git       # target: l10n_ar_payment_bundle, account_payment_pro*
        ref: "19.0"
      - url: https://github.com/ingadhoc/account-financial-tools.git  # account_ux, account_internal_transfer
        ref: "19.0"
      - url: https://github.com/ingadhoc/sale.git                  # sale_ux
        ref: "19.0"
      - url: https://github.com/ingadhoc/stock.git                 # stock_ux, delivery_ux, stock_declared_value
        ref: "19.0"

client:
  addons_path: client/addons

workspace:
  checkout_timeout_seconds: 600

backend:
  odoo:
    bind_host: 0.0.0.0
    http_port: 18169
